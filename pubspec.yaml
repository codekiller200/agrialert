name: agrialert_bf
description: Application mobile d'alerte sécheresse et conseils agricoles pour le Burkina Faso
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI et design
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  
  # Carte et localisation
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0
  geocoding: ^2.1.1
  
  # IA et Machine Learning
  tflite_flutter: ^0.10.4
  
  # Réseau et API
  http: ^1.2.0
  dio: ^5.4.0
  
  # Stockage local
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  sqflite: ^2.3.2
  
  # Utilitaires
  intl: ^0.20.2
  provider: ^6.1.1
  url_launcher: ^6.2.4
  share_plus: ^7.2.1
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
